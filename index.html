<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Replacement Simulator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h1 {
    text-align: center;
}

input, select, button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
    font-size: 16px;
}

button {
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

.results {
    margin-top: 20px;
    padding: 15px;
    background: #f9f9f9;
    border-radius: 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}

th {
    background: #007bff;
    color: white;
}

.hit {
    background: #b6ffb6;
}

.fault {
    background: #ffb6b6;
}

#error {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Page Replacement Algorithm Simulator</h1>

<label>Reference String</label>
<input type="text" id="referenceString"
placeholder="Example: 7 0 1 2 0 3 0 4 2 3 0 3 2">

<label>Number of Frames</label>
<input type="number" id="frameCount" placeholder="Example: 3">

<label>Algorithm</label>
<select id="algorithm">
    <option value="FIFO">FIFO</option>
    <option value="Optimal">Optimal</option>
    <option value="LRU">LRU</option>
</select>

<button onclick="simulate()">Simulate</button>
<button onclick="generateRandom()">Generate Random</button>
<button onclick="resetSimulator()">Reset</button>

<p id="error"></p>

<div class="results">
    <h2>Results</h2>
    <p id="faults"></p>
    <p id="hits"></p>
    <p id="ratio"></p>
</div>

<table id="simulationTable">
    <thead></thead>
    <tbody></tbody>
</table>

</div>

<script>

function simulate() {

    const referenceString =
    document.getElementById("referenceString").value.trim();

    const frameCount =
    parseInt(document.getElementById("frameCount").value);

    const algorithm =
    document.getElementById("algorithm").value;

    if(referenceString === "") {
        document.getElementById("error").innerText =
        "Please enter a reference string.";
        return;
    }

    if(isNaN(frameCount) || frameCount <= 0) {
        document.getElementById("error").innerText =
        "Please enter a valid frame count.";
        return;
    }

    document.getElementById("error").innerText = "";

    const pages = referenceString.split(" ").map(Number);

    let result;

    if(algorithm === "FIFO") {
        result = fifo(pages, frameCount);
    }
    else if(algorithm === "Optimal") {
        result = optimal(pages, frameCount);
    }
    else {
        result = lru(pages, frameCount);
    }

    displayResults(result, frameCount);
}

function fifo(pages, frameCount) {

    let frames = [];
    let queue = [];

    let faults = 0;
    let hits = 0;

    let steps = [];

    for(let page of pages) {

        let status = "Hit";

        if(!frames.includes(page)) {

            faults++;
            status = "Fault";

            if(frames.length < frameCount) {
                frames.push(page);
                queue.push(page);
            }
            else {

                let oldest = queue.shift();

                let index = frames.indexOf(oldest);

                frames[index] = page;

                queue.push(page);
            }
        }
        else {
            hits++;
        }

        steps.push({
            page: page,
            frames: [...frames],
            status: status
        });
    }

    return {
        faults,
        hits,
        steps,
        total: pages.length
    };
}

function optimal(pages, frameCount) {

    let frames = [];

    let faults = 0;
    let hits = 0;

    let steps = [];

    for(let i = 0; i < pages.length; i++) {

        let page = pages[i];

        let status = "Hit";

        if(!frames.includes(page)) {

            faults++;
            status = "Fault";

            if(frames.length < frameCount) {
                frames.push(page);
            }
            else {

                let farthest = -1;
                let replaceIndex = -1;

                for(let j = 0; j < frames.length; j++) {

                    let nextUse =
                    pages.slice(i + 1).indexOf(frames[j]);

                    if(nextUse === -1) {
                        replaceIndex = j;
                        break;
                    }

                    if(nextUse > farthest) {
                        farthest = nextUse;
                        replaceIndex = j;
                    }
                }

                frames[replaceIndex] = page;
            }
        }
        else {
            hits++;
        }

        steps.push({
            page: page,
            frames: [...frames],
            status: status
        });
    }

    return {
        faults,
        hits,
        steps,
        total: pages.length
    };
}

function lru(pages, frameCount) {

    let frames = [];

    let faults = 0;
    let hits = 0;

    let steps = [];

    let recentUse = {};

    for(let i = 0; i < pages.length; i++) {

        let page = pages[i];

        let status = "Hit";

        if(!frames.includes(page)) {

            faults++;
            status = "Fault";

            if(frames.length < frameCount) {
                frames.push(page);
            }
            else {

                let lruPage = frames[0];

                for(let frame of frames) {

                    if(recentUse[frame] <
                       recentUse[lruPage]) {

                        lruPage = frame;
                    }
                }

                let index = frames.indexOf(lruPage);

                frames[index] = page;
            }
        }
        else {
            hits++;
        }

        recentUse[page] = i;

        steps.push({
            page: page,
            frames: [...frames],
            status: status
        });
    }

    return {
        faults,
        hits,
        steps,
        total: pages.length
    };
}

function displayResults(result, frameCount) {

    document.getElementById("faults").innerText =
    "Page Faults: " + result.faults;

    document.getElementById("hits").innerText =
    "Page Hits: " + result.hits;

    let ratio =
    ((result.hits / result.total) * 100).toFixed(2);

    document.getElementById("ratio").innerText =
    "Hit Ratio: " + ratio + "%";

    let thead =
    document.querySelector("#simulationTable thead");

    let tbody =
    document.querySelector("#simulationTable tbody");

    thead.innerHTML = "";
    tbody.innerHTML = "";

    let header =
    "<tr><th>Step</th><th>Reference</th>";

    for(let i = 1; i <= frameCount; i++) {
        header += "<th>Frame " + i + "</th>";
    }

    header += "<th>Status</th></tr>";

    thead.innerHTML = header;

    result.steps.forEach((step, index) => {

        let row =
        "<tr class='" +
        step.status.toLowerCase() +
        "'>";

        row += "<td>" + (index + 1) + "</td>";

        row += "<td>" + step.page + "</td>";

        for(let i = 0; i < frameCount; i++) {

            row += "<td>" +
            (step.frames[i] !== undefined
            ? step.frames[i]
            : "-")
            + "</td>";
        }

        row += "<td>" + step.status + "</td>";

        row += "</tr>";

        tbody.innerHTML += row;
    });
}

function generateRandom() {

    let arr = [];

    for(let i = 0; i < 15; i++) {
        arr.push(Math.floor(Math.random() * 10));
    }

    document.getElementById("referenceString").value =
    arr.join(" ");
}

function resetSimulator() {

    document.getElementById("referenceString").value = "";

    document.getElementById("frameCount").value = "";

    document.getElementById("faults").innerText = "";

    document.getElementById("hits").innerText = "";

    document.getElementById("ratio").innerText = "";

    document.querySelector("#simulationTable thead").innerHTML = "";

    document.querySelector("#simulationTable tbody").innerHTML = "";

    document.getElementById("error").innerText = "";
}

</script>

</body>
</html>
